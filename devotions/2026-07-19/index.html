                interpretation: "지난 주일 우리는 순종의 자리에서 새로운 창조가 일어난다는 것을 배웠습니다. 아브람의 이야기는 그 원리의 가장 오래된 본보기입니다 — 그는 논리적으로 이해가 되어서가 아니라, 하나님의 말씀 자체를 신뢰해서 떠났습니다. 그리고 그 순종이 믿음의 역사의 시작이 되었습니다.",
                illustration: "처음 자전거를 배울 때는 페달을 밟기 전까지 균형을 잡을 수 없습니다. 넘어질까 두려워 페달을 밟지 않으면 영원히 배울 수 없습니다. 순종도 마찬가지입니다 — 완전히 이해된 다음에 순종하는 것이 아니라, 순종함으로써 비로소 하나님의 인도하심을 경험하게 됩니다.",
                question: "지금 하나님이 나에게 \"떠나라\" 말씀하시는 익숙한 무언가가 있다면 무엇입니까? 목적지를 다 알지 못해도 그 말씀을 따라갈 준비가 되어 있습니까?",
                summary: "아브람의 믿음은 이해에서 시작된 것이 아니라, 순종의 첫걸음에서 시작되었습니다.",
                action: "하나님이 마음에 주신 작은 순종 하나(미루고 있던 것)를 오늘 실행에 옮기기",
                prayer: "아브람을 부르신 하나님, 제가 다 이해하지 못해도 주님의 말씀을 따라 첫걸음을 내딛게 하소서."
            },
            {
                day: "주일",
                title: "날마다 새로워지는 삶",
                passageRef: "고린도후서 4장 16절 ~ 18절",
                passageText: "우리가 낙심하지 아니하노니 우리의 겉사람은 낡아지나 우리의 속사람은 날로 새로워지도다... 우리가 주목하는 것은 보이는 것이 아니요 보이지 않는 것이니 보이는 것은 잠깐이요 보이지 않는 것은 영원함이라",
                background: "바울은 극심한 고난 가운데서도 낙심하지 않는 이유를 설명합니다 — 겉사람(육체, 상황)은 쇠하여가지만, 속사람(영혼)은 날마다 새로워지기 때문입니다.",
                interpretation: "이번 한 주 우리는 창조의 패턴(혼돈 위의 성령님, 말씀이 세우는 질서, 채우시는 은혜, 새로운 피조물, 순종)을 따라 걸어왔습니다. 오늘 이 말씀은 그 모든 것을 하나로 묶습니다 — 새로워짐은 하루아침의 사건이 아니라 \"날마다\" 반복되는 과정입니다. 겉으로는 여전히 연약하고 흔들려도, 속사람은 계속 새로워지고 있습니다.",
                illustration: "나무는 겉으로 보기엔 매일 크게 달라 보이지 않지만, 나이테는 해마다 하나씩 늘어갑니다. 우리의 영적 성장도 눈에 보이는 극적 변화보다, 매일 조금씩 쌓이는 나이테와 같습니다.",
                question: "이번 한 주 묵상을 통해, 내 \"속사람\"에 어떤 새로워짐이 있었습니까? 다음 한 주도 그 새로워짐을 이어가기 위해 무엇을 붙들고 싶습니까?",
                summary: "겉사람은 낡아져도, 그리스도 안에서 우리의 속사람은 날마다 새로워지고 있습니다.",
                action: "이번 주 묵상 중 가장 기억하고 싶은 말씀 한 구절을 다시 떠올리며, 다음 한 주도 매일 그 말씀과 함께 시작하기로 결단하기",
                prayer: "날마다 속사람을 새롭게 하시는 하나님, 보이는 상황에 낙심하지 않고 보이지 않는 영원한 소망을 붙들게 하소서."
            }
        ];

        let currentDayIndex = 0;
        const homeView = document.getElementById('home-view');
        const dailyView = document.getElementById('daily-view');
        const dayList = document.getElementById('day-list');

        let currentSlide = 1;
        const totalSlides = 23;

        function updateSlide() {
            const img = document.getElementById('slide-image');
            img.style.opacity = '0.3'; 
            setTimeout(() => {
                img.src = `slide${currentSlide}.png`;
                img.style.opacity = '1';
            }, 150);
            document.getElementById('slide-counter').innerText = `${currentSlide} / ${totalSlides}`;
        }

        function prevSlide() {
            currentSlide--;
            if (currentSlide < 1) currentSlide = totalSlides;
            updateSlide();
        }

        function nextSlide() {
            currentSlide++;
            if (currentSlide > totalSlides) currentSlide = 1;
            updateSlide();
        }

        function initApp() {
            const completedDays = JSON.parse(localStorage.getItem(DEVOTION_KEY) || '[]');
            dayList.innerHTML = ''; 
            
            devotionals.forEach((dev, index) => {
                const isCompleted = completedDays.includes(index);
                const bgClass = isCompleted ? 'bg-stone-50 border-stone-200' : 'bg-white border-stone-200 hover:border-emerald-400';
                const textClass = isCompleted ? 'text-stone-400' : 'text-stone-800';
                const checkIcon = isCompleted ? '<i class="fas fa-check-circle text-emerald-500 text-xl"></i>' : '<i class="far fa-circle text-stone-300 text-xl group-hover:text-emerald-400"></i>';

                const card = document.createElement('div');
                card.className = `group p-4 rounded-xl border cursor-pointer transition-all card-shadow flex items-center justify-between ${bgClass}`;
                card.onclick = () => openDaily(index);
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full ${isCompleted ? 'bg-stone-200' : 'wood-gradient'} text-white flex items-center justify-center font-bold shadow-sm flex-shrink-0">
                            ${dev.day}
                        </div>
                        <div>
                            <h3 class="font-bold ${textClass} text-base sm:text-lg mb-1">${dev.title}</h3>
                            <p class="text-xs ${isCompleted ? 'text-stone-400' : 'text-stone-500'} font-medium"><i class="fas fa-bible mr-1"></i> ${dev.passageRef}</p>
                        </div>
                    </div>
                    <div>${checkIcon}</div>
                `;
                dayList.appendChild(card);
            });
        }

        function openDaily(index) {
            currentDayIndex = index;
            const data = devotionals[index];
            const completedDays = JSON.parse(localStorage.getItem(DEVOTION_KEY) || '[]');
            const isCompleted = completedDays.includes(index);

            const badgeText = data.day === '주일' ? '주일 묵상' : `${data.day}요일의 묵상`;
            document.getElementById('daily-badge').innerText = badgeText;
            document.getElementById('daily-title').innerText = data.title;
            document.getElementById('daily-passage-ref').innerHTML = `<i class="fas fa-bible mr-1"></i> ${data.passageRef}`;
            document.getElementById('daily-passage-text').innerText = data.passageText;
            document.getElementById('daily-background').innerText = data.background;
            document.getElementById('daily-interpretation').innerText = data.interpretation;
            document.getElementById('daily-illustration').innerText = data.illustration;
            document.getElementById('daily-question').innerText = `"${data.question}"`;
            document.getElementById('daily-summary').innerText = data.summary;
            document.getElementById('daily-action').innerText = data.action;
            document.getElementById('daily-prayer').innerText = data.prayer;

            const btnComplete = document.getElementById('btn-complete');
            if(isCompleted) {
                btnComplete.innerHTML = '<i class="fas fa-check"></i> 완료된 묵상입니다';
                btnComplete.className = "w-full py-4 rounded-xl font-bold text-lg transition-all flex items-center justify-center gap-2 bg-stone-200 text-stone-500 cursor-not-allowed";
                btnComplete.disabled = true;
            } else {
                btnComplete.innerHTML = '<i class="fas fa-check-circle"></i> 오늘의 묵상 완료하기';
                btnComplete.className = "w-full py-4 rounded-xl font-bold text-lg transition-all shadow-md flex items-center justify-center gap-2 emerald-gradient text-white hover:opacity-90";
                btnComplete.disabled = false;
            }

            homeView.classList.add('hidden');
            dailyView.classList.remove('hidden');
            window.scrollTo(0, 0); 
        }

        function goHome() {
            dailyView.classList.add('hidden');
            homeView.classList.remove('hidden');
            initApp(); 
            window.scrollTo(0, 0);
        }

        function markAsCompleted() {
            const completedDays = JSON.parse(localStorage.getItem(DEVOTION_KEY) || '[]');
            if (!completedDays.includes(currentDayIndex)) {
                completedDays.push(currentDayIndex);
                localStorage.setItem(DEVOTION_KEY, JSON.stringify(completedDays));
            }
            goHome(); 
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
